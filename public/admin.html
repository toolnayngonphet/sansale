<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thống Kê Admin</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #070b12; color: #fff; }
        .container { background: #0f1622; padding: 30px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.4); border: 1px solid #1e293b; }
        h2 { color: #ee4d2d; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; font-size: 13.5px; margin-bottom: 25px; }
        
        /* Form Đăng Nhập */
        #loginZone { max-width: 400px; margin: 60px auto; background: #0f1622; padding: 30px; border-radius: 12px; border: 1px solid #1e293b; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #8fa0b5; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; box-sizing: border-box; background: #16202e; border: 1px solid #2d3d54; border-radius: 6px; color: white; font-size: 14px; }
        .form-group input:focus { border-color: #ee4d2d; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: #ee4d2d; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .btn-login:hover { background: #d73a1e; }
        
        /* Giao Diện Chính */
        #adminDashboardZone { display: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-logout { background: #cbd5e1; color: #0f1622; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #131c2a; border: 1px solid #223147; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #8fa0b5; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #fb923c; }

        /* Cụm hành động tác vụ */
        .action-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .btn-action { color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-size: 13.5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-refresh { background-color: #2d3d54; border: 1px solid #3b5271; }
        .btn-refresh:hover { background-color: #3b5271; }
        .btn-clear { background-color: #7f1d1d; border: 1px solid #991b1b; }
        .btn-clear:hover { background-color: #991b1b; }

        h3.section-title { font-size: 16px; color: #cbd5e1; border-left: 4px solid #ee4d2d; padding-left: 8px; margin-top: 30px; margin-bottom: 15px; }
        
        .table-wrapper { width: 100%; overflow-x: auto; background: #101726; border: 1px solid #1e293b; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #162238; color: #8fa0b5; padding: 12px 15px; font-weight: bold; border-bottom: 1px solid #1e293b; }
        td { padding: 12px 15px; border-bottom: 1px solid #1e293b; color: #cbd5e1; max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover td { background: #131c2a; }
        
        .link-text { color: #38bdf8; text-decoration: none; }
        .link-text:hover { text-decoration: underline; }
        .count-badge { background: #241416; color: #f87171; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        
        /* Thanh Điều Hướng Phân Trang (Pagination) */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; padding: 10px 0; }
        .page-btn { background: #1e293b; color: #cbd5e1; border: 1px solid #334155; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .page-btn:hover { background: #334155; color: white; }
        .page-btn.active { background: #ee4d2d; color: white; border-color: #ee4d2d; }
        .page-btn:disabled { background: #0b1017; color: #475569; border-color: #1e293b; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- PHÂN KHU 1: CỬA SỔ ĐĂNG NHẬP BẢO MẬT -->
    <div id="loginZone">
        <h2 style="margin-bottom: 25px;">Đăng Nhập Admin</h2>
        <div class="form-group">
            <label>Tài khoản quản trị</label>
            <input type="text" id="admUser" placeholder="Tên đăng nhập...">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="admPass" placeholder="Mật khẩu...">
        </div>
        <button class="btn-login" onclick="handleLogin()">ĐĂNG NHẬP</button>
    </div>

    <!-- PHÂN KHU 2: BẢNG ĐIỀU KHIỂN CHÍNH HỆ THỐNG -->
    <div id="adminDashboardZone" class="container">
        <div class="header-row">
            <h2>Bảng Điều Khiển Admin</h2>
            <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
        </div>
        <div class="subtitle">Dữ liệu thống kê tự động lưu trữ và tự xóa sau 7 ngày</div>

        <!-- CỤM HÀNH ĐỘNG TÁC VỤ -->
        <div class="action-bar">
            <button class="btn-action btn-refresh" onclick="refreshAllData()">🔄 Làm mới dữ liệu</button>
            <button class="btn-action btn-clear" onclick="clearAllAdminLogs()">🔥 Xóa tất cả nhật ký</button>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>Tổng lượt tạo liên kết (7 ngày qua)</h3>
                <div id="totalClicksValue" class="value">0</div>
            </div>
        </div>

        <!-- KHỐI 1: TOP SẢN PHẨM -->
        <h3 class="section-title">Top 10 Sản Phẩm Hot Nhất</h3>
        <div class="table-wrapper" style="margin-bottom: 30px;">
            <table>
                <thead>
                    <tr>
                        <th>Tên Sản Phẩm</th>
                        <th style="width: 120px; text-align: center;">Lượt Tạo Link</th>
                    </tr>
                </thead>
                <tbody id="topProductsTarget">
                    <tr><td colspan="2" style="text-align:center; color:#64748b;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- KHỐI 2: LỊCH SỬ TIME-REAL CÓ PHÂN TRANG -->
        <h3 class="section-title">Lịch Sử Tạo Link Chi Tiết</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 130px;">Thời Gian</th>
                        <th>Tên Sản Phẩm</th>
                        <th style="width: 120px;">Liên Kết Gốc</th>
                    </tr>
                </thead>
                <tbody id="recentLogsTarget">
                    <tr><td colspan="3" style="text-align:center; color:#64748b;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- THANH PHÂN TRANG 1, 2... X -->
        <div class="pagination-container" id="paginationZone"></div>
    </div>

<script>
    let currentPage = 1;
    const limitPerPage = 10; // Đặt hiển thị giới hạn 10 dòng/trang đồng bộ với backend

    // Hàm kiểm tra trạng thái Token đăng nhập khi vừa tải trang
    function checkAuthDisplay() {
        const token = localStorage.getItem('admin_session_token');
        if (token) {
            document.getElementById('loginZone').style.display = 'none';
            document.getElementById('adminDashboardZone').style.display = 'block';
            refreshAllData();
        } else {
            document.getElementById('loginZone').style.display = 'block';
            document.getElementById('adminDashboardZone').style.display = 'none';
        }
    }

    // Xử lý đăng nhập tài khoản gửi lên Server nhận Token phiên làm việc
    async function handleLogin() {
        const username = document.getElementById('admUser').value.trim();
        const password = document.getElementById('admPass').value.trim();

        if (!username || !password) { alert("Vui lòng điền đủ tài khoản và mật khẩu!"); return; }

        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('admin_session_token', data.token);
                currentPage = 1; // Reset về trang đầu tiên
                checkAuthDisplay();
            } else {
                alert(data.message);
            }
        } catch (err) {
            console.error("Lỗi đăng nhập:", err);
            alert("Lỗi kết nối đến máy chủ.");
        }
    }

    // Đăng xuất xóa token phiên làm việc khỏi LocalStorage
    function handleLogout() {
        localStorage.removeItem('admin_session_token');
        location.reload();
    }

    // Hàm gộp làm mới toàn bộ bảng biểu dữ liệu thống kê
    function refreshAllData() {
        loadOverviewStats();
        loadPagedLogs(currentPage);
    }

    // Gửi yêu cầu DELETE lên Server để dọn dẹp Database chủ động
    async function clearAllAdminLogs() {
        if (!confirm("⚠️ CẢNH BÁO: Bạn có chắc chắn muốn XÓA SẠCH toàn bộ dữ liệu thống kê và lịch sử tạo liên kết hiện tại không? Hành động này không thể phục hồi!")) {
            return;
        }

        const token = localStorage.getItem('admin_session_token');
        try {
            const res = await fetch('/api/admin/clear-logs', {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) { handleLogout(); return; }
            const data = await res.json();

            if (data.success) {
                alert(data.message);
                currentPage = 1; // Reset về trang đầu
                refreshAllData(); // Reload lại bảng trống
            } else {
                alert("Xóa nhật ký thất bại: " + data.message);
            }
        } catch (err) {
            console.error("Lỗi xóa dữ liệu:", err);
            alert("Không thể kết nối đến máy chủ để dọn dẹp dữ liệu.");
        }
    }

    // 1. Tải số liệu tổng quan & top sản phẩm hot (API: overview)
    async function loadOverviewStats() {
        const token = localStorage.getItem('admin_session_token');
        try {
            const res = await fetch('/api/admin/overview', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 401) { handleLogout(); return; }
            const data = await res.json();

            if (data.success) {
                document.getElementById('totalClicksValue').innerText = data.totalClicks.toLocaleString('vi-VN');

                const topTarget = document.getElementById('topProductsTarget');
                if (!data.topProducts || data.topProducts.length === 0) {
                    topTarget.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#64748b;">Chưa có dữ liệu sản phẩm.</td></tr>';
                } else {
                    topTarget.innerHTML = data.topProducts.map(item => `
                        <tr>
                            <td title="${item._id}">${item._id}</td>
                            <td style="text-align: center;"><span class="count-badge">${item.count} lượt</span></td>
                        </tr>
                    `).join('');
                }
            }
        } catch (err) {
            console.error("Lỗi nạp overview:", err);
        }
    }

    // 2. Tải số liệu nhật ký lịch sử kèm phân trang 1, 2... (API: logs)
    async function loadPagedLogs(page) {
        currentPage = page;
        const token = localStorage.getItem('admin_session_token');
        try {
            const res = await fetch(`/api/admin/logs?page=${page}&limit=${limitPerPage}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 401) { handleLogout(); return; }
            const data = await res.json();

            if (data.success) {
                const recentTarget = document.getElementById('recentLogsTarget');
                if (!data.logs || data.logs.length === 0) {
                    recentTarget.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b;">Không có dữ liệu nhật ký ở trang này.</td></tr>';
                    document.getElementById('paginationZone').innerHTML = '';
                    return;
                }

                recentTarget.innerHTML = data.logs.map(item => {
                    const date = new Date(item.createdAt);
                    const timeStr = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} ${String(date.getDate()).padStart(2, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    
                    return `
                        <tr>
                            <td style="color:#8fa0b5; font-size:12.5px;">${timeStr}</td>
                            <td title="${item.productName}">${item.productName}</td>
                            <td><a class="link-text" href="${item.productUrl}" target="_blank">Xem Link</a></td>
                        </tr>
                    `;
                }).join('');

                // Render giao diện thanh bấm số trang chuyển đổi dữ liệu
                buildPaginationUI(data.pagination);
            }
        } catch (err) {
            console.error("Lỗi nạp logs phân trang:", err);
        }
    }

    // Tạo các nút bấm chuyển trang động dựa trên siêu dữ liệu (meta) từ API
    function buildPaginationUI(meta) {
        const zone = document.getElementById('paginationZone');
        zone.innerHTML = '';

        // Nút lùi trang trước (Prev)
        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerText = 'Trước';
        prevBtn.disabled = meta.currentPage === 1;
        prevBtn.onclick = () => loadPagedLogs(meta.currentPage - 1);
        zone.appendChild(prevBtn);

        // Danh sách các số trang 1, 2, 3...
        for (let i = 1; i <= meta.totalPages; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = `page-btn ${meta.currentPage === i ? 'active' : ''}`;
            pageBtn.innerText = i;
            pageBtn.onclick = () => loadPagedLogs(i);
            zone.appendChild(pageBtn);
        }

        // Nút tiến trang sau (Next)
        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerText = 'Sau';
        nextBtn.disabled = meta.currentPage === meta.totalPages || meta.totalPages === 0;
        nextBtn.onclick = () => loadPagedLogs(meta.currentPage + 1);
        zone.appendChild(nextBtn);
    }

    // Chạy kích hoạt kiểm tra phiên đăng nhập ngay khi mở trang
    document.addEventListener('DOMContentLoaded', checkAuthDisplay);
</script>
</body>
</html>
